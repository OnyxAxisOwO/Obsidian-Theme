<script>
/* Early-init (no-flash): identical tonal engine to the theme's header.ut / obsidian.js. */
(function () {
	try {
		var d = document.documentElement, ls = window.localStorage;
		var get = function (k, f) { try { var v = ls.getItem(k); return v === null ? f : v; } catch (e) { return f; } };
		var hslToRgb = function (h, s, l) { var c = (1 - Math.abs(2 * l - 1)) * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = l - c / 2, r, g, b;
			if (h < 60) { r = c; g = x; b = 0; } else if (h < 120) { r = x; g = c; b = 0; } else if (h < 180) { r = 0; g = c; b = x; }
			else if (h < 240) { r = 0; g = x; b = c; } else if (h < 300) { r = x; g = 0; b = c; } else { r = c; g = 0; b = x; }
			return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)]; };
		var hslc = function (h, s, l) { return 'hsl(' + Math.round(h) + ', ' + Math.round(s * 100) + '%, ' + Math.round(l * 100) + '%)'; };
		var parseSeed = function (seed) { var m = /^#?([0-9a-fA-F]{6})$/.exec((seed || '').trim()); if (!m) return null;
			var n = parseInt(m[1], 16), r = (n >> 16 & 255) / 255, g = (n >> 8 & 255) / 255, b = (n & 255) / 255;
			var mx = Math.max(r, g, b), mn = Math.min(r, g, b), df = mx - mn, h = 0, s = 0, l = (mx + mn) / 2;
			if (df) { s = df / (1 - Math.abs(2 * l - 1)); h = (mx === r ? ((g - b) / df) % 6 : mx === g ? (b - r) / df + 2 : (r - g) / df + 4) * 60; if (h < 0) h += 360; }
			return { h: h, s: s }; };
		var seed = get('obsidian.accent', ''), globalTheme = get('obsidian.themeGlobal', '1') === '1';
		var applyTheme = function (sd, dk) { var p = parseSeed(sd); if (!p) return;
			var ach = p.s < 0.08, h = p.h, s = ach ? 0 : Math.max(0.32, Math.min(0.85, p.s)), sN = ach ? 0 : 0.06, sV = ach ? 0 : 0.12, rgb = hslToRgb(h, s, dk ? 0.80 : 0.42), S = function (k, v) { d.style.setProperty(k, v); };
			S('--ob-accent', 'rgb(' + rgb[0] + ', ' + rgb[1] + ', ' + rgb[2] + ')'); S('--ob-accent-rgb', rgb[0] + ', ' + rgb[1] + ', ' + rgb[2]);
			S('--ob-accent-press', hslc(h, s, dk ? 0.70 : 0.34)); S('--ob-accent-soft', hslc(h, Math.min(s, 0.55), dk ? 0.30 : 0.90)); S('--ob-on-accent', dk ? '#0a0a0a' : '#ffffff');
			if (globalTheme) { S('--ob-bg', hslc(h, sN, dk ? 0.06 : 0.96)); S('--ob-card', hslc(h, sN, dk ? 0.12 : 0.99)); S('--ob-card-2', hslc(h, sN, dk ? 0.17 : 0.94)); S('--ob-card-strong', hslc(h, sN, dk ? 0.20 : 1.0));
				S('--ob-bar', 'hsla(' + Math.round(h) + ', ' + Math.round(sN * 100) + '%, ' + (dk ? 6 : 98) + '%, 0.82)'); S('--ob-elevated', hslc(h, sN, dk ? 0.18 : 0.99));
				S('--ob-hairline', hslc(h, sV, dk ? 0.30 : 0.82)); S('--ob-hairline-strong', hslc(h, sV, dk ? 0.42 : 0.68)); S('--ob-fill', hslc(h, sN, dk ? 0.17 : 0.94)); S('--ob-fill-hover', hslc(h, sN, dk ? 0.24 : 0.90));
				S('--ob-text', hslc(h, sN, dk ? 0.92 : 0.10)); S('--ob-text-2', hslc(h, sV, dk ? 0.80 : 0.30)); S('--ob-text-3', hslc(h, sV, dk ? 0.60 : 0.50)); } };
		var mode = get('obsidian.appearance', 'auto'), mq = window.matchMedia('(prefers-color-scheme: dark)');
		var apply = function () { var dark = mode === 'dark' ? true : mode === 'light' ? false : mq.matches; d.setAttribute('data-darkmode', dark ? 'true' : 'false'); d.setAttribute('data-appearance', mode); if (seed) applyTheme(seed, dark); };
		apply(); if (mode === 'auto') { try { mq.addEventListener('change', apply); } catch (e) { mq.addListener(apply); } }
		var w = get('obsidian.wallpaper', ''); if (w) { d.style.setProperty('--ob-wallpaper', w); d.setAttribute('data-has-wallpaper', ''); }
		var fit = get('obsidian.wpfit', ''), FITS = { cover: ['cover', 'no-repeat'], contain: ['contain', 'no-repeat'], stretch: ['100% 100%', 'no-repeat'], tile: ['auto', 'repeat'], center: ['auto', 'no-repeat'] };
		if (fit && FITS[fit]) { d.style.setProperty('--ob-wallpaper-size', FITS[fit][0]); d.style.setProperty('--ob-wallpaper-repeat', FITS[fit][1]); }
		var wd = get('obsidian.width', ''); if (wd) d.style.setProperty('--ob-content-width', wd);
		var b = get('obsidian.blur', ''); if (b !== '') d.style.setProperty('--ob-wallpaper-blur', b + 'px');
		var dm = get('obsidian.dim', ''); if (dm !== '') d.style.setProperty('--ob-wallpaper-dim', dm);
		if (get('obsidian.reduceTransparency', '0') === '1') d.setAttribute('data-reduce-transparency', '');
		if (get('obsidian.reduceMotion', '0') === '1') d.setAttribute('data-reduce-motion', '');
	} catch (e) {}
})();
</script>

<style>
/* ---- preview-only extras (use the theme's own tokens so they re-skin too) ---- */
.demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 14px; }
.demo-tile { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border: 1px solid var(--ob-hairline); border-radius: var(--ob-radius-lg); background: var(--ob-card-2); }
.demo-tile .t-label { font-size: 12px; color: var(--ob-text-3); margin-bottom: 3px; }
.demo-tile .t-value { font-size: 22px; font-weight: 680; letter-spacing: -.4px; color: var(--ob-text); line-height: 1.1; }
.demo-tile .t-sub { font-size: 11.5px; color: var(--ob-text-3); margin-top: 3px; }
.demo-gauge { width: 56px; height: 56px; flex: 0 0 auto; }
.demo-gauge circle { fill: none; stroke-width: 5.5; }
.demo-gauge .g-track { stroke: var(--ob-hairline-strong); opacity: .55; }
.demo-gauge .g-val { stroke: var(--ob-accent); stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dasharray .7s var(--ob-spring); }
.demo-gauge text { fill: var(--ob-text); font: 700 15px var(--ob-font); }
.sig { display: inline-flex; align-items: flex-end; gap: 2px; height: 15px; vertical-align: middle; }
.sig i { width: 3px; background: var(--ob-hairline-strong); border-radius: 1px; }
.sig i.on { background: var(--ob-accent); }
.sig i:nth-child(1) { height: 5px; } .sig i:nth-child(2) { height: 8px; } .sig i:nth-child(3) { height: 11px; } .sig i:nth-child(4) { height: 15px; }
.demo-log { font-family: var(--ob-mono); font-size: 12px; line-height: 1.75; color: var(--ob-text-2); background: var(--ob-fill); border: 1px solid var(--ob-hairline); border-radius: var(--ob-radius); padding: 14px 16px; max-height: 420px; overflow: auto; white-space: pre-wrap; word-break: break-word; }
.demo-log b { color: var(--ob-text); font-weight: 600; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ob-text-3); margin-right: 7px; vertical-align: middle; }
.dot.up { background: #34c759; } .dot.down { background: var(--ob-text-3); }
.demo-hero { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.demo-hero .hero-logo { width: 44px; height: 44px; border-radius: 11px; }
/* align-items:center keeps buttons at their natural height — without it a flex
   row taller than the buttons (e.g. the overview hero) stretches them unevenly. */
.demo-row-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 2px; }
/* margin:0 is the real alignment fix: the theme gives .cbi-button-apply a
   margin-bottom:18px (for standalone form buttons), which in an align-items:center
   row centres its margin-box and pushes that button ~9px up vs its neighbour.
   The #maincontent prefix is needed to outrank the theme's #maincontent
   .cbi-button-apply rule. Fixed height + nowrap keep them the same size too. */
.demo-row-actions button { white-space: nowrap; flex: 0 0 auto; height: 34px; line-height: 1; }
#maincontent .demo-row-actions button { margin: 0; }
.muted { color: var(--ob-text-3); }
.demo-banner {
	display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
	margin: 0 auto 18px; max-width: var(--ob-content-width);
	padding: 9px 16px; border-radius: var(--ob-radius-pill);
	background: color-mix(in srgb, var(--ob-accent) 12%, var(--ob-card));
	border: 1px solid var(--ob-hairline); font-size: 12.5px; color: var(--ob-text-2);
}
.demo-banner b { color: var(--ob-text); font-weight: 600; }
.demo-banner .bx { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.demo-banner a.bx-link { color: var(--ob-accent); font-weight: 600; }
:root[data-darkmode="true"] .demo-banner a.bx-link { color: var(--ob-text); }
.toast {
	position: fixed; left: 50%; bottom: 30px; transform: translate(-50%, 18px); z-index: 5000;
	background: var(--ob-text); color: var(--ob-bg); font-size: 13px; font-weight: 550;
	padding: 11px 18px 11px 16px; border-radius: var(--ob-radius-pill); box-shadow: var(--ob-shadow-2);
	opacity: 0; pointer-events: none; display: inline-flex; align-items: center; gap: 9px; max-width: 80vw;
	transition: opacity .3s var(--ob-ease), transform .35s var(--ob-spring);
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }
.toast svg { width: 16px; height: 16px; flex: 0 0 auto; }
.inline-input { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.inline-input input { flex: 1 1 220px; }
.grow { flex: 1 1 auto; }

/* ── mobile (preview-only tweaks; mirror the theme's 680 px breakpoint) ── */
@media (max-width: 680px) {
	/* Banner: regular radius + flush links when wrapped */
	.demo-banner {
		border-radius: var(--ob-radius);
		padding: 8px 14px;
		gap: 8px;
		margin-bottom: 14px;
	}
	.demo-banner .bx { margin-left: 0; }

	/* Root cause of horizontal page overflow on phones: <body> is a column
	   flexbox, so #maincontent (a flex item) keeps the default min-width:auto
	   and refuses to shrink below its widest child. A 5-column table then
	   forces #maincontent — and the whole page — wider than the viewport.
	   min-width:0 lets the flex item shrink back; max-width:100% caps it. */
	#maincontent { min-width: 0; max-width: 100%; }

	/* Wide tables (device list, leases…) scroll inside their own wrapper
	   instead of stretching the page. width:0 + min-width:100% pins the
	   wrapper to its parent's width — ignoring the table's intrinsic width —
	   so it can clip and scroll. The table keeps max-content (one line per
	   cell) and is scrolled horizontally within. Wrapper added in JS. */
	.tscroll {
		overflow-x: auto;
		-webkit-overflow-scrolling: touch;
		width: 0;
		min-width: 100%;
	}
	.tscroll > table.table { width: max-content; min-width: 100%; }

	/* Stats grid: force 2 columns on all phone widths */
	.demo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
	.demo-tile { padding: 12px 14px; gap: 10px; }
	.demo-tile .t-value { font-size: 18px; }
	.demo-gauge { width: 44px; height: 44px; }
	.demo-gauge circle { stroke-width: 4.5; }
	.demo-gauge text { font: 700 13px var(--ob-font); }

	/* Log box: shorten so it doesn't swallow the viewport */
	.demo-log { max-height: 200px; }

	/* Hero action buttons: tighter gap */
	.demo-row-actions { gap: 6px; }

	/* Hero: keep logo+title on row 1, push buttons to a full-width row 2
	   so they are always clearly visible and large enough to tap. */
	.demo-hero .demo-row-actions { flex-basis: 100%; margin-top: 2px; }

	/* ── Header / top menu ──
	   IMPORTANT: do NOT put overflow-x on .nav to keep it on one line. Setting
	   overflow-x:auto forces overflow-y to auto as well, which clips the
	   dropdown menus (状态/系统/网络) — they open *below* the bar and would be
	   cut off, making those items impossible to tap. Instead we tighten the
	   spacing so the menu fits, and let it wrap as a harmless fallback. */
	header { gap: 8px; }
	header .nav { column-gap: 2px; row-gap: 2px; }
	header .nav a, header .nav a.menu { padding: 5px 7px; font-size: 12.5px; }

	/* Indicators: keep "注销" intact and drop the unsaved badge to free room. */
	#indicators { flex-shrink: 0; gap: 6px; }
	#indicators a { white-space: nowrap; font-size: 12px; padding: 4px 8px; }
	#ind-unsaved { display: none; }
}
</style>

<script>
/* =====================================================================
   Demo router — drives the multi-page LuCI mock. No backend; every
   control is wired so the showcase feels like a real router admin.
   ===================================================================== */
(function () {
	"use strict";
	var mc = document.getElementById("maincontent");
	var toastEl = document.getElementById("toast");
	var toastTimer = null;
	var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
	var unsaved = 0;

	function toast(msg, withCheck) {
		toastEl.innerHTML = (withCheck === false ? "" : CHECK) + "<span></span>";
		toastEl.querySelector("span").textContent = msg;
		toastEl.classList.add("show");
		clearTimeout(toastTimer);
		toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
	}
	function setUnsaved(n) {
		unsaved = Math.max(0, n);
		var el = document.getElementById("ind-unsaved");
		if (el) el.textContent = unsaved + " 项未保存";
	}

	/* ---- reusable fragments ---- */
	function actions(opts) {
		opts = opts || {};
		var btns = "";
		btns += '<button class="cbi-button cbi-button-save" data-act="save">保存</button>';
		btns += '<button class="cbi-button cbi-button-apply" data-act="apply">保存并应用</button>';
		btns += '<button class="cbi-button cbi-button-reset" data-act="reset">复位</button>';
		if (opts.remove) btns += '<button class="cbi-button cbi-button-remove" data-act="remove">删除</button>';
		return '<div class="cbi-page-actions">' + btns + '</div>';
	}
	function row(title, field, desc, last) {
		return '<div class="cbi-value' + (last ? ' cbi-value-last' : '') + '">' +
			'<label class="cbi-value-title">' + title + '</label>' +
			'<div class="cbi-value-field">' + field + '</div>' +
			(desc ? '<div class="cbi-value-description">' + desc + '</div>' : '') + '</div>';
	}
	function sw(checked) { return '<input type="checkbox"' + (checked ? ' checked' : '') + '>'; }
	function sel(opts) { return '<select>' + opts.map(function (o) {
		return '<option' + (o[1] ? ' selected' : '') + '>' + o[0] + '</option>'; }).join("") + '</select>'; }
	function txt(v, ph) { return '<input type="text" class="cbi-input-text" value="' + (v || "") + '"' + (ph ? ' placeholder="' + ph + '"' : '') + '>'; }
	function gauge(pct, label) {
		return '<svg class="demo-gauge" viewBox="0 0 56 56"><circle class="g-track" cx="28" cy="28" r="23" pathLength="100"/>' +
			'<circle class="g-val" cx="28" cy="28" r="23" pathLength="100" stroke-dasharray="' + pct + ' 100"/>' +
			'<text x="28" y="33" text-anchor="middle">' + (label || (pct + "%")) + '</text></svg>';
	}
	function sigbars(n) {
		var s = '<span class="sig">';
		for (var i = 1; i <= 4; i++) s += '<i' + (i <= n ? ' class="on"' : '') + '></i>';
		return s + '</span>';
	}

	/* ---- data ---- */
	var CLIENTS = [
		["iPhone 15 Pro",  "192.168.1.142", "a4:83:e7:2c:1d:90", -47, 4, "1.9 GB"],
		["MacBook-Pro",    "192.168.1.108", "f0:18:98:11:42:7a", -53, 4, "12.4 GB"],
		["Pixel-Tablet",   "192.168.1.156", "3c:22:fb:90:0e:11", -69, 2, "330 MB"],
		["NAS-Synology",   "192.168.1.10",  "00:11:32:aa:bc:de", null, 0, "88.0 GB"],
		["ESP32-Sensor",   "192.168.1.201", "24:6f:28:11:02:9c", -74, 1, "12 MB"]
	];
	var LEASES = [
		["iPhone-15-Pro", "192.168.1.142", "a4:83:e7:2c:1d:90", "11h 32m"],
		["MacBook-Pro",   "192.168.1.108", "f0:18:98:11:42:7a", "9h 04m"],
		["Pixel-Tablet",  "192.168.1.156", "3c:22:fb:90:0e:11", "5h 47m"]
	];
	var PACKAGES = [
		["luci-base", "24.10.0", "LuCI 核心库"],
		["luci-theme-obsidian", "1.0.5-1", "Obsidian 主题"],
		["luci-app-firewall", "24.10.0", "防火墙配置界面"],
		["dnsmasq-full", "2.90-3", "DNS / DHCP 服务"],
		["wpad-openssl", "2024-03", "无线认证守护进程"],
		["kmod-nft-offload", "6.6.52", "硬件流量卸载"]
	];
	var SERVICES = [
		["dnsmasq",  "DNS 与 DHCP 服务器", true],
		["firewall", "网络防火墙 (nftables)", true],
		["uhttpd",   "Web 服务器 (LuCI)", true],
		["dropbear", "SSH 服务器", true],
		["openvpn",  "OpenVPN 隧道", false]
	];

	/* ---- pages ---- */
	var P = {};

	P.overview = { title: "状态 · 概览", render: function () {
		var clientRows = CLIENTS.map(function (c) {
			return '<tr class="tr"><td class="td">' + c[0] + '</td><td class="td">' + c[1] +
				'</td><td class="td"><code>' + c[2] + '</code></td><td class="td">' +

					: sigbars(c[4]) + ' <span class="muted">' + c[3] + ' dBm</span>') +
				'</td><td class="td">' + c[5] + '</td></tr>';
		}).join("");

			'<legend style="text-align:center">登录 OpenWrt</legend>' +
			'<p class="cbi-section-descr" style="text-align:center">请输入用户名与密码。</p>' +
			row("用户名", txt("root")) +
			row("密码", '<input type="password" class="cbi-input-text" placeholder="密码" value="demo">', null, true) +
			'<div class="cbi-page-actions"><button class="cbi-button cbi-button-apply grow" data-act="dologin">登录</button></div>' +
		'</div></div></form>';
	}};

	/* ---- routing ---- */
	function setActiveNav(id) {
		var nav = document.getElementById("topmenu");
		nav.querySelectorAll("li").forEach(function (li) { li.classList.remove("active"); });
		var link = nav.querySelector('[data-route="' + id + '"]');
		if (link) {
			var li = link.closest("li"); if (li) li.classList.add("active");
			var top = link.closest("li.dropdown"); if (top) top.classList.add("active");
		}
	}
	/* Wrap every table in a horizontal-scroll container so wide tables scroll
	   on small screens instead of widening the page (see .tscroll in CSS). */
	function wrapTables() {
		mc.querySelectorAll("table.table").forEach(function (t) {
			if (t.parentNode && t.parentNode.classList.contains("tscroll")) return;
			var w = document.createElement("div");
			w.className = "tscroll";
			t.parentNode.insertBefore(w, t);
			w.appendChild(t);
		});
	}

	function navigate(id, push) {
		var page = P[id] ? id : "overview";
		var r = P[page];
		mc.innerHTML = r.render();
		wrapTables();
		setActiveNav(page);
		document.title = r.title + " · OpenWrt | Obsidian";
		try { window.scrollTo({ top: 0, behavior: "auto" }); } catch (e) { window.scrollTo(0, 0); }
		document.querySelectorAll("#topmenu li.dropdown.ob-open").forEach(function (li) { li.classList.remove("ob-open"); });
		if (push !== false) { try { location.hash = "#/" + page; } catch (e) {} }
	}
	function curHash() { return ((location.hash || "").replace(/^#\/?/, "")) || "overview"; }

	/* ---- delegated interactions ---- */
	function addRow(kind) {
		if (kind === "lease") {
			var tbl = document.getElementById("lease-rows"); if (!tbl) return;
			var tr = document.createElement("tr"); tr.className = "tr"; tr.setAttribute("data-leaserow", "");
			tr.innerHTML = '<td class="td">' + txt("", "主机名") + '</td><td class="td">' + txt("", "MAC") + '</td><td class="td">' + txt("", "IPv4") + '</td><td class="td"><button class="cbi-button cbi-button-remove" data-act="del-row">删除</button></td>';
			tbl.appendChild(tr);
		} else if (kind === "port") {
			var t = document.getElementById("pf-rows"); if (!t) return;
			var r = document.createElement("tr"); r.className = "tr"; r.setAttribute("data-pfrow", "");
			r.innerHTML = '<td class="td">' + txt("", "名称") + '</td><td class="td">' + sel([["TCP", true], ["UDP", false]]) + '</td><td class="td">' + txt("", "端口") + '</td><td class="td">' + txt("", "192.168.1.x") + '</td><td class="td"><button class="cbi-button cbi-button-remove" data-act="del-row">删除</button></td>';
			t.appendChild(r);
		} else if (kind === "ntp") {
			var list = document.getElementById("ntp-list"); if (!list) return;
			var d = document.createElement("div"); d.className = "inline-input"; d.setAttribute("data-ntprow", ""); d.style.marginBottom = "8px";
			d.innerHTML = txt("", "新的 NTP 服务器") + '<button class="cbi-button cbi-button-remove" data-act="del-row">删除</button>';
			list.appendChild(d);
		}
		toast("已添加一行", false);
	}

	document.addEventListener("click", function (e) {
		var t = e.target;
		if (!t || !t.closest) return;

		/* navigation */
		var nav = t.closest("[data-route]");
		if (nav) { e.preventDefault(); navigate(nav.getAttribute("data-route")); return; }

		/* in-page tabs */
		var tab = t.closest("[data-tab]");
		if (tab) {
			e.preventDefault();
			var key = tab.getAttribute("data-tab");
			var menu = tab.closest("[data-tabs]");
			if (menu) menu.querySelectorAll("li").forEach(function (li) { li.classList.remove("active"); });
			var li2 = tab.closest("li"); if (li2) li2.classList.add("active");
			document.querySelectorAll(".tabpane").forEach(function (p) { p.hidden = p.getAttribute("data-pane") !== key; });
			return;
		}

		/* add a list row */
		var add = t.closest("[data-add]");
		if (add) { e.preventDefault(); addRow(add.getAttribute("data-add")); return; }

		/* delete a row */
		var del = t.closest('[data-act="del-row"]');
		if (del) {
			e.preventDefault();
			var rr = del.closest("[data-leaserow],[data-pfrow],[data-ntprow]");
			if (rr) rr.parentNode.removeChild(rr);
			toast("已删除一行", false);
			return;
		}

		/* simple toast buttons */
		var tb = t.closest("[data-toast]");
		if (tb) { e.preventDefault(); toast(tb.getAttribute("data-toast")); return; }

		/* form-action buttons */
		var act = t.closest("[data-act]");
		if (act) {
			e.preventDefault();
			var a = act.getAttribute("data-act");
			if (a === "save") { setUnsaved(unsaved + 1); toast("已保存（待应用）"); }
			else if (a === "apply") {
				act.textContent = "正在应用…";
				setTimeout(function () { act.textContent = "保存并应用"; setUnsaved(0); toast("配置已应用"); }, 850);
			}
			else if (a === "reset") { toast("已复位为已保存的值", false); }
			else if (a === "remove") { toast("已删除该配置", false); }
			else if (a === "dologin") { navigate("overview"); setTimeout(function () { toast("欢迎回来，root"); }, 200); }
			else if (a === "logrefresh") {
				var box = document.getElementById("logbox");
				if (box) box.insertAdjacentHTML("beforeend", '<b>Mon Jun 14 09:14:' + (10 + Math.floor((box.children.length * 7) % 50)) + ' 2026</b> uhttpd: page rendered with Obsidian theme\n');
				if (box) box.scrollTop = box.scrollHeight;
				toast("日志已刷新");
			}
			return;
		}
	});

	/* range output + service toggle toasts */
	document.addEventListener("input", function (e) {
		var r = e.target;
		if (r && r.matches && r.matches("input[type=range][data-out]")) {
			var out = document.querySelector(r.getAttribute("data-out"));
			if (out) out.textContent = r.value + "%";
		}
	});
	document.addEventListener("change", function (e) {
		var c = e.target;
		if (c && c.matches && c.matches("input[type=checkbox][data-toast-on]")) {
			toast(c.checked ? c.getAttribute("data-toast-on") : c.getAttribute("data-toast-off"));
		}
	});

	window.addEventListener("hashchange", function () { navigate(curHash(), false); });
	navigate(curHash(), false);
})();
</script>
</body>
</html>
