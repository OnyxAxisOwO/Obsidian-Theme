name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # required to create a Release on tag pushes

jobs:
  build:
    name: Build & validate .ipk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Lint JavaScript (syntax check)
        run: |
          node --check htdocs/luci-static/obsidian/obsidian.js
          node --check htdocs/luci-static/resources/menu-obsidian.js

      - name: Build .ipk
        run: python packaging/build-ipk.py

      - name: Validate .ipk
        run: python packaging/validate-ipk.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-obsidian-ipk
          path: dist/*.ipk
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
          fail_on_unmatched_files: true
